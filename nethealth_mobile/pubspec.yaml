name: nethealth_mobile
description: NetHealth - Healthcare Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Fonts
  google_fonts: ^6.2.1

  # UI Utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
